<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones básicas</title>
</head>
<body>
    <h2>Operador Dinámico</h2>
    <div class="Datos">
        <label>Argumento A</label>
        <input type="number" id="arg1" placeholder="Ej: 10">
    </div>
    <div class="Datos">
        <label>Operación</label>
        <select id="operador">
            <optgroup label="Aritméticas">
                <option value="+">Suma (+)</option>
                <option value="-">Resta (-)</option>
                <option value="*">Multiplicación (*)</option>
                <option value="/">División (/)</option>
                <option value="%">Módulo (%)</option>
            </optgroup>
            <optgroup label="Lógicas (Booleanas)">
                <option value="&&">AND Lógico (&&)</option>
                <option value="||">OR Lógico (||)</option>
            </optgroup>
            <optgroup label="De Bits (Bitwise)">
                <option value="&">AND de Bits (&)</option>
                <option value="|">OR de Bits (|)</option>
                <option value="^">XOR de Bits (^)</option>
                <option value="<<">Desplazamiento Izq (<<)</option>
                <option value=">>">Desplazamiento Der (>>)</option>
            </optgroup>
        </select>
    </div>
    <div class="Datos">
        <label>Argumento B</label>
        <input type="number" id="arg2" placeholder="Ej: 5">
    </div>
    <button onclick="calcular()">Calcular Resultado</button>
    <p id = "Resultado">Resultado: </p>
</body>
</html>
